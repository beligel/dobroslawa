# Nginx конфигурация для dobroslawa.ru
# Расположить: /etc/nginx/sites-available/dobroslawa.ru

server {
    listen 80;
    listen [::]:80;
    server_name dobroslawa.ru www.dobroslawa.ru;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dobroslawa.ru www.dobroslawa.ru;
    
    root /var/www/dobroslawa.ru/public;
    index index.html;
    
    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/dobroslawa.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dobroslawa.ru/privkey.pem;
    
    # SSL optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xhtml+xml application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Static file caching
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Fonts cors headers
    location ~* \.(?:woff2?|ttf|otf|eot)$ {
        expires 6M;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, immutable";
    }
    
    # Main location
    location / {
        try_files $uri $uri/ /index.html;
        
        # Micro caching for HTML (optional)
        expires -1;
        add_header Cache-Control "private, must-revalidate";
    }
    
    # Security: Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Old Django redirects (SEO preservation)
    location ~ ^/rooms/([0-9]+)/$ {
        return 301 /index.html#rooms;
    }
    
    location ~ ^/booking/$ {
        return 301 /index.html;
    }
    
    location ~ ^/about/$ {
        return 301 /index.html;
    }
    
    location ~ ^/contacts/$ {
        return 301 /index.html#contacts;
    }
    
    # Sitemap and robots (if static files exist)
    location = /sitemap.xml {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }
    
    location = /robots.txt {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/errors;
    }
}

# Rate limiting zone (optional)
limit_req_zone $binary_remote_addr zone=booking:10m rate=1r/m;

# Apply rate limiting to booking endpoint
location /api/booking {
    limit_req zone=booking burst=5 nodelay;
    # ... proxy or handler
}